version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: demo_api-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_SA_PASSWORD}
      - MSSQL_PID=Express
    ports:
      - "${DB_PORT:-1433}:1433"
    volumes:
      - mssql_data:/var/opt/mssql/data
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${HEALTHCHECK_DB_PASSWORD}", "-C", "-Q", "SELECT 1" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - default

  redis:
    image: redis:8.6.2-alpine
    container_name: demo_api-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - default

  webapi:
    build: .
    container_name: demo_api-web
    ports:
      - "${API_PORT:-8080}:8080"
    develop:
      watch:
        - path: ./src
          action: rebuild
          target: /src
        - path: ./appsettings*.json
          action: sync+restart
          target: /app
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ConnectionStrings__DefaultConnection=${CONNECTION_STRING_DEFAULT}
      - ConnectionStrings__Redis=${CONNECTION_STRING_REDIS}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    networks:
      - default

volumes:
  mssql_data:
  redis_data:

networks:
  default:
    driver: bridge