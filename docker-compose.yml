version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sa
      POSTGRES_PASSWORD: MyPassw0rd!2024
      POSTGRES_DB: alphalising
    ports: ["5432:5432"]
    volumes: ["postgres-data:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  demo_api:
    build: .
    ports: ["8080:8080"]
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=alphalising;Username=sa;Password=MyPassw0rd!2024
      - ConnectionStrings__Redis=redis:6379
    depends_on: [postgres, redis]

volumes:
  postgres-data: