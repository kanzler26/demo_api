# .github/workflows/ci.yml
name: CI/CD Pipeline

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOTNET_VERSION: "9.0.x"
  PROJECT_PATH: AlphaLising/AlphaLising.csproj

jobs:
  # === 1. LINT & BUILD ===
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --no-restore --configuration Release

      - name: Run analyzers
        run: dotnet format ${{ env.PROJECT_PATH }} --verify-no-changes --no-restore || echo "⚠️ Format warnings"

  # === 2. TEST ===
  test:
    name: Run Tests
    runs-on: ubuntu-24.04
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Run unit tests
        run: dotnet test ${{ env.PROJECT_PATH }} --no-restore --configuration Release --collect:"XPlat Code Coverage" --logger:"console;verbosity=detailed"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: github.event_name == 'push'
        with:
          files: "**/coverage.cobertura.xml"
          fail_ci_if_error: false

  # === 3. BUILD & PUSH DOCKER IMAGE ===
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-24.04
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy to Beget VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin 2>/dev/null || true

            docker pull ${{ secrets.DOCKER_USERNAME }}/demo_api:latest

            docker stop demo_api 2>/dev/null || true
            docker rm demo_api 2>/dev/null || true

            docker run -d \
              --name demo_api \
              --restart unless-stopped \
              -p 8080:8080 \
              -e ASPNETCORE_ENVIRONMENT=Production \
              -e ASPNETCORE_URLS=http://+:8080 \
              -e ConnectionStrings__Redis=${{ secrets.REDIS_CONNECTION }} \ 
              ${{ secrets.DOCKER_USERNAME }}/demo_api:latest

            docker image prune -f
  # === 4. DEPLOY TO VPS ===
  deploy-to-vps:
    name: Deploy to Beget VPS
    runs-on: ubuntu-24.04
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            # Логин в GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin 2>/dev/null || true

            # Pull образа из GHCR (используем тот же IMAGE_NAME, что и в сборке)
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:master

            # Останавливаем старый контейнер
            docker stop demo_api 2>/dev/null || true
            docker rm demo_api 2>/dev/null || true

            # Запускаем новый
            docker run -d \
              --name demo_api \
              --restart unless-stopped \
              -p 8080:8080 \
              -e ASPNETCORE_ENVIRONMENT=Production \
              -e ASPNETCORE_URLS=http://+:8080 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:master

            # Чистим старые образы
            docker image prune -f
