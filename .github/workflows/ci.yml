  # === 3. BUILD & PUSH DOCKER IMAGE + DEPLOY ===
  # === 3. BUILD & PUSH DOCKER IMAGE + DEPLOY + MIGRATIONS ===
  docker-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-24.04
    # needs: test  # Раскомментируйте, если включите тесты
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # 🔥 1. Setup .NET SDK (нужен для генерации миграций)
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # 🔥 2. Установить dotnet-ef для генерации скрипта
      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef --version 9.0.2

      - name: Add tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:
            type=gha,mode=max

