# .github/workflows/ci.yml
name: CI/CD Pipeline

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

# 🔥 Подавляем предупреждение о депрекации Node.js 20
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # === 1. LINT & BUILD (проверка кода) ===
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore AlphaLising/AlphaLising.csproj

      - name: Build
        run: dotnet build AlphaLising/AlphaLising.csproj --no-restore --configuration Release

      - name: Run analyzers
        run: dotnet format AlphaLising/AlphaLising.csproj --verify-no-changes --no-restore || echo "⚠️ Format warnings"

  # === 2. BUILD & DEPLOY (только если пуш в master/dev) ===
  docker-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-24.04
    needs: lint-and-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 🔥 ДЕПЛОЙ на VPS
      - name: Deploy to Beget VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            echo "🔐 Logging in to GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin 2>/dev/null || true

            IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
            echo "📦 Pulling image: $IMAGE_TAG"
            docker pull "$IMAGE_TAG"

            echo "🌐 Ensuring app-network exists..."
            docker network create app-network 2>/dev/null || true

            echo "🍅 Ensuring Redis is running..."
            if ! docker ps --format '{{.Names}}' | grep -q '^redis$'; then
              docker run -d --name redis --restart unless-stopped \
                --network app-network redis:7-alpine
              echo "✅ Redis started"
            fi

            echo "🚀 Deploying demo_api..."
            docker rm -f demo_api 2>/dev/null || true

            docker run -d \
              --name demo_api \
              --restart unless-stopped \
              --network app-network \
              -p 8080:8080 \
              -e ASPNETCORE_ENVIRONMENT=Production \
              -e ASPNETCORE_URLS=http://+:8080 \
              -e ConnectionStrings__Redis=redis:6379 \
              -e ConnectionStrings__DefaultConnection="${{ secrets.SQL_CONNECTION }}" \
              "$IMAGE_TAG"

            echo "⏳ Waiting 15s for app startup..."
            sleep 15

            echo "🩺 Health check (accepts 200 or 404)..."
            HEALTH_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/Categories/1)
            if [[ "$HEALTH_CODE" =~ ^(200|404)$ ]]; then
              echo "✅ App is healthy! (HTTP $HEALTH_CODE)"
            else
              echo "❌ Health check failed with HTTP $HEALTH_CODE"
              echo "📋 Last 30 logs:"
              docker logs demo_api --tail 30
              exit 1
            fi

            echo "🧹 Cleaning up old images..."
            docker image prune -f || true
