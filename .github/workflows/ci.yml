# .github/workflows/ci.yml
name: CI/CD Pipeline

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOTNET_VERSION: "9.0.x"
  PROJECT_PATH: AlphaLising/AlphaLising.csproj

jobs:
  # === 1. LINT & BUILD + MIGRATION SCRIPT ===
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --no-restore --configuration Release

      - name: Run analyzers
        run: dotnet format ${{ env.PROJECT_PATH }} --verify-no-changes --no-restore || echo "⚠️ Format warnings"

      - name: Debug Check tools availability
        run: |
          echo "🔍 dotnet version: $(dotnet --version)"
          echo "🔍 dotnet-ef version: $(dotnet ef --version || echo 'NOT FOUND')"
          echo "🔍 PATH: $PATH"
          ls -la "$HOME/.dotnet/tools/" 2>/dev/null || echo "⚠️ Tools directory not found"

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef --version 9.0.2

      - name: Add tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Generate idempotent migration script
        run: |
          dotnet ef migrations script \
            --project Infrastructure/Infrastructure.csproj \
            --startup-project AlphaLising/AlphaLising.csproj \
            --context Infrastructure.Context.MyAppContext \
            --output migrations.sql \
            --idempotent \
            --verbose
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.SQL_CONNECTION }}

      - name: Copy migration script to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "${{ github.workspace }}/migrations.sql" # 🔥 Абсолютный путь
          target: "/tmp" # 🔥 Копирует в /tmp/migrations.sql
          # strip_components: 1  ← 🔥 УДАЛИТЬ ЭТУ СТРОКУ!
          overwrite: true # Перезаписать, если файл есть

  # === 2. TEST (закомментировано, можно раскомментировать позже) ===
